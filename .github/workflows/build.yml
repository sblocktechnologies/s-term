name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos
            command: npm run package -- --mac dmg --publish never
            files: release/*.dmg
          - os: windows-latest
            artifact: windows
            command: npm run package -- --win nsis --publish never
            files: release/*.exe
          - os: ubuntu-latest
            artifact: linux
            command: npm run package -- --linux AppImage --publish never
            files: release/*.AppImage

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v5
        with:
          name: s-term-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: s-term-*
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            for artifact in release/*; do
              gh release upload "$GITHUB_REF_NAME" "$artifact" --repo "$GITHUB_REPOSITORY" 2>/dev/null || echo "Skipping existing asset: $(basename "$artifact")"
            done
          else
            gh release create "$GITHUB_REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --generate-notes --title "S-Term $GITHUB_REF_NAME"
          fi
