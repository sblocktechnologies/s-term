name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos
            command: npm run package -- --mac dmg --publish never
            files: release/*.dmg
          - os: windows-latest
            artifact: windows
            command: npm run package -- --win nsis --publish never
            files: release/*.exe
          - os: ubuntu-latest
            artifact: linux
            command: npm run package -- --linux AppImage --publish never
            files: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Prepare Apple notarization key
        if: matrix.artifact == 'macos'
        shell: bash
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          test -n "$APPLE_API_KEY_P8_BASE64"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          test -n "$MAC_CERT_P12_BASE64"
          test -n "$MAC_CERT_PASSWORD"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Package desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.artifact == 'macos' && 'true' || 'false' }}
          CSC_LINK: ${{ matrix.artifact == 'macos' && secrets.MAC_CERT_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.artifact == 'macos' && secrets.MAC_CERT_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ matrix.artifact == 'macos' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.artifact == 'macos' && secrets.APPLE_API_ISSUER || '' }}
        run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v5
        with:
          name: s-term-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: s-term-*
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            for artifact in release/*; do
              gh release upload "$GITHUB_REF_NAME" "$artifact" --repo "$GITHUB_REPOSITORY" 2>/dev/null || echo "Skipping existing asset: $(basename "$artifact")"
            done
          else
            gh release create "$GITHUB_REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --generate-notes --title "S-Term $GITHUB_REF_NAME"
          fi
